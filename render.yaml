# Render Blueprint — hosts the Alfie API gateway (services/api) as a persistent Node web service.
# Render → New → Blueprint → connect the Alfy2 repo → it reads this file → fill the secret env vars.
services:
  - type: web
    name: alfie-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --prod=false
    startCommand: pnpm --filter @alfy2/api exec tsx src/main.ts
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ALFY_ENV
        value: production
      - key: ALFY_DEFAULT_TENANT_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: ALFY_CORS_ORIGINS
        value: https://alfy2.vercel.app
      # Auth: a single personal-access token so the dashboard can read live data without a login flow.
      - key: ALFY_AUTH_MODE
        value: token
      - key: ALFY_API_TOKEN # generate a long random string; you paste it in the dashboard's Connect box
        sync: false
      # Secrets — set these in the Render dashboard (never committed):
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
