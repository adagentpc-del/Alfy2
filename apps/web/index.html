<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alfy2 · Enterprise Command Center</title>
<meta name="theme-color" content="#143829" />
<link rel="manifest" href="/assets/manifest.webmanifest" />
<link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/assets/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="/assets/theme.css?v=14" />
<script>
  // Boot guard: a blank page is never acceptable. Any uncaught error renders itself on screen.
  window.addEventListener("error", function (e) { window.__bootFail(e.message + (e.filename ? " — " + e.filename.split("/").pop() + ":" + e.lineno : "")); });
  window.addEventListener("unhandledrejection", function (e) { window.__bootFail("unhandled: " + (e.reason && e.reason.message || e.reason)); });
  window.__bootFail = function (msg) {
    var o = document.getElementById("outlet");
    if (o && o.innerHTML.trim().length < 50) {
      o.innerHTML = '<div style="max-width:560px;margin:60px auto;padding:24px 28px;background:#fffdf8;border:1px solid #e8e2d2;border-radius:14px;font-family:Georgia,serif">' +
        '<div style="font-size:19px;margin-bottom:8px">Something failed to start.</div>' +
        '<div style="font-family:monospace;font-size:12px;background:#f8f5ee;padding:10px 12px;border-radius:8px;overflow-wrap:anywhere">' + String(msg).replace(/</g, "&lt;") + '</div>' +
        '<div style="font-size:13px;margin-top:12px">Try a hard refresh (Ctrl/Cmd+Shift+R). If this box persists, send the text above to Claude — it names the exact bug.</div>' +
        '<button onclick="localStorage.clear();location.reload()" style="margin-top:12px;padding:7px 14px;border:1px solid #d8d0ba;border-radius:8px;background:#fff;cursor:pointer;font-size:12px">Reset local state &amp; reload</button></div>';
    }
  };
  // If the module never boots (cached stale mix, network), say so after 6s instead of staying blank.
  setTimeout(function () { if (!window.__alfyBooted) window.__bootFail("the app module did not boot (likely a stale cached file or a blocked script)"); }, 6000);
</script>
</head>

<div class="app">
  <nav class="nav">

    <button class="navitem" data-nav="/command-center" data-navkey="command-center"><span class="ic">◎</span> Command Center</button>

    <button class="navitem" data-nav="/pay" data-navkey="pay"><span class="ic">◇</span> Divini Pay</button>
    <button class="navitem" data-nav="/approvals" data-navkey="approvals"><span class="ic">✓</span> Approvals <span class="badge" id="apr-badge">0</span></button>
    <button class="navitem" data-nav="/reports/weekly" data-navkey="reports"><span class="ic">▤</span> Weekly Report</button>
    <button class="navitem" data-nav="/life" data-navkey="life"><span class="ic">❋</span> Life</button>
    <div class="navsec">Enterprise</div>
    <button class="navitem" data-nav="/agents" data-navkey="agents"><span class="ic">◈</span> Agent Cabinet</button>
    <button class="navitem" data-nav="/portfolio" data-navkey="portfolio"><span class="ic">▦</span> Portfolio</button>
    <button class="navitem" data-nav="/brain" data-navkey="brain"><span class="ic">✳</span> Brain Center</button>
    <button class="navitem" data-nav="/readiness" data-navkey="readiness"><span class="ic">⬢</span> Readiness</button>
    <button class="navitem" data-nav="/vault" data-navkey="vault"><span class="ic">⬒</span> Vault</button>
    <div class="navfoot">Preview build · mock operating data<br/>v2.0 · Jul 2026
      <div><button id="btn-reset">Reset demo state</button></div>
    </div>
  </nav>
